name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: '@tinyidp/n8n-nodes-tinyidp/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: @tinyidp/n8n-nodes-tinyidp

      - name: Run lint
        run: npm run lint
        working-directory: @tinyidp/n8n-nodes-tinyidp

      - name: Run build
        run: npm run build
        working-directory: @tinyidp/n8n-nodes-tinyidp
